<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, ui-sans-serif, system-ui">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070b" />
      <stop offset="100%" stop-color="#0a0d14" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />

  <!-- Header -->
  <g transform="translate(48, 36)">
    <rect width="40" height="40" rx="10" fill="#11151f" stroke="#38bdf855" />
    <circle cx="20" cy="20" r="6" fill="url(#accent)" />
    <text x="56" y="22" fill="#e2e8f0" font-size="18" font-weight="600">Jarvis</text>
    <text x="56" y="40" fill="#94a3b8" font-size="11">Desktop assistant — voice, chat, tools</text>
    <text x="1184" y="32" fill="#94a3b8" font-size="11" text-anchor="end">Connection: open</text>
  </g>

  <!-- Main chat card -->
  <g transform="translate(48, 96)">
    <rect width="840" height="560" rx="20" fill="#0a0d14cc" stroke="#1a1f2c" />
    <!-- User bubble -->
    <g transform="translate(440, 32)">
      <rect width="360" height="56" rx="14" fill="#0ea5e91a" stroke="#0ea5e955" />
      <text x="16" y="22" fill="#7dd3fc" font-size="10" letter-spacing="1">YOU</text>
      <text x="16" y="42" fill="#e2e8f0" font-size="14">summarize ~/notes/today.md</text>
    </g>
    <!-- Assistant bubble -->
    <g transform="translate(32, 112)">
      <rect width="520" height="120" rx="14" fill="#11151fcc" stroke="#1a1f2c" />
      <text x="16" y="22" fill="#94a3b8" font-size="10" letter-spacing="1">JARVIS</text>
      <text x="16" y="48" fill="#e2e8f0" font-size="14">Quick read of today's notes:</text>
      <text x="16" y="70" fill="#cbd5e1" font-size="13">• Shipped the auth refactor PR (#142).</text>
      <text x="16" y="88" fill="#cbd5e1" font-size="13">• Pairing with Sam at 3 PM on Whisper latency.</text>
      <text x="16" y="106" fill="#cbd5e1" font-size="13">• Action: file expense report before EOD.</text>
    </g>
    <!-- Tool trace -->
    <g transform="translate(32, 248)">
      <rect width="520" height="48" rx="10" fill="#11151f99" stroke="#1a1f2c" />
      <text x="16" y="22" fill="#7dd3fc" font-size="12" font-family="JetBrains Mono, monospace">summarize_file</text>
      <text x="16" y="38" fill="#94a3b8" font-size="11">path=/home/ady/notes/today.md</text>
      <rect x="460" y="14" width="44" height="20" rx="999" fill="#10b9811a" stroke="#10b98155" />
      <text x="482" y="28" fill="#6ee7b7" font-size="10" text-anchor="middle">ok</text>
    </g>

    <!-- Composer -->
    <g transform="translate(24, 472)">
      <rect width="792" height="76" rx="16" fill="#11151fcc" stroke="#1a1f2c" />
      <circle cx="56" cy="38" r="26" fill="#0a0d14" stroke="#0ea5e988" />
      <path d="M50 28 v14 a6 6 0 0 0 12 0 v-14 a6 6 0 0 0 -12 0 z M44 38 a12 12 0 0 0 24 0 M56 56 v6 M50 62 h12" stroke="#38bdf8" stroke-width="1.6" fill="none" stroke-linecap="round" />
      <rect x="100" y="14" width="600" height="48" rx="12" fill="#0a0d14" stroke="#1a1f2c" />
      <text x="116" y="42" fill="#64748b" font-size="13">Ask Jarvis to open an app, summarize a file…</text>
      <rect x="712" y="22" width="64" height="32" rx="10" fill="#0ea5e933" stroke="#38bdf8aa" />
      <text x="744" y="42" fill="#7dd3fc" font-size="12" text-anchor="middle">Send</text>
    </g>
  </g>

  <!-- Status panel -->
  <g transform="translate(912, 96)">
    <rect width="320" height="280" rx="20" fill="#0a0d14cc" stroke="#1a1f2c" />
    <text x="20" y="32" fill="#cbd5e1" font-size="11" letter-spacing="2">SYSTEM</text>
    <rect x="240" y="18" width="64" height="20" rx="999" fill="#10b9811a" stroke="#10b98155" />
    <text x="272" y="32" fill="#6ee7b7" font-size="10" text-anchor="middle">open</text>

    <g transform="translate(20, 56)">
      <rect width="130" height="56" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
      <text x="14" y="20" fill="#64748b" font-size="9" letter-spacing="1.5">VERSION</text>
      <text x="14" y="42" fill="#e2e8f0" font-size="14" font-weight="600">0.1.0</text>
      <rect x="148" width="130" height="56" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
      <text x="162" y="20" fill="#64748b" font-size="9" letter-spacing="1.5">UPTIME</text>
      <text x="162" y="42" fill="#e2e8f0" font-size="14" font-weight="600">12m 04s</text>
      <rect y="68" width="130" height="56" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
      <text x="14" y="88" fill="#64748b" font-size="9" letter-spacing="1.5">CPU</text>
      <text x="14" y="110" fill="#6ee7b7" font-size="14" font-weight="600">18.4%</text>
      <rect x="148" y="68" width="130" height="56" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
      <text x="162" y="88" fill="#64748b" font-size="9" letter-spacing="1.5">MEMORY</text>
      <text x="162" y="110" fill="#fbbf24" font-size="14" font-weight="600">62.0%</text>
    </g>

    <text x="20" y="212" fill="#cbd5e1" font-size="11" letter-spacing="2">OPENAI</text>
    <rect x="20" y="222" width="84" height="20" rx="999" fill="#10b9811a" stroke="#10b98155" />
    <text x="62" y="236" fill="#6ee7b7" font-size="10" text-anchor="middle">configured</text>
  </g>

  <!-- Task list -->
  <g transform="translate(912, 392)">
    <rect width="320" height="264" rx="20" fill="#0a0d14cc" stroke="#1a1f2c" />
    <text x="20" y="32" fill="#cbd5e1" font-size="11" letter-spacing="2">TASKS</text>
    <rect x="248" y="18" width="56" height="20" rx="999" fill="#11151f" stroke="#1a1f2c" />
    <text x="276" y="32" fill="#cbd5e1" font-size="10" text-anchor="middle">3 open</text>

    <g transform="translate(20, 52)" fill="#e2e8f0" font-size="13">
      <g>
        <rect width="280" height="44" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
        <rect x="12" y="14" width="14" height="14" rx="3" fill="none" stroke="#475569" />
        <text x="36" y="28">File expense report</text>
      </g>
      <g transform="translate(0, 52)">
        <rect width="280" height="44" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
        <rect x="12" y="14" width="14" height="14" rx="3" fill="none" stroke="#475569" />
        <text x="36" y="28">Pair with Sam — Whisper latency</text>
      </g>
      <g transform="translate(0, 104)">
        <rect width="280" height="44" rx="10" fill="#11151fcc" stroke="#1a1f2c" />
        <rect x="12" y="14" width="14" height="14" rx="3" fill="none" stroke="#475569" />
        <text x="36" y="28">Review PulseGuard PR</text>
      </g>
      <g transform="translate(0, 156)" opacity="0.6">
        <rect width="280" height="44" rx="10" fill="#11151f66" stroke="#1a1f2c" />
        <rect x="12" y="14" width="14" height="14" rx="3" fill="#10b9811a" stroke="#10b98155" />
        <text x="36" y="28" fill="#64748b" text-decoration="line-through">Ship auth refactor PR</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(48, 680)" fill="#64748b" font-size="11">
    <text>Backend at /api → http://localhost:8000</text>
    <text x="1184" text-anchor="end">Reset conversation</text>
  </g>
</svg>
